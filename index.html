<style>

      <h2>The Dubai Land Department (DLD)</h2>
      <p>The DLD is the master authority over all real estate in Dubai. Every property transaction — sale, mortgage, gift, inheritance — is registered here. It was established in 1960 and operates under Dubai Law No. 7 of 2006. Think of it as the registrar, the notary, and the enforcement body all in one.</p>
      <ul>
        <li><strong>Registers all title deeds (musataha, freehold, usufruct)</strong></li>
        <li><strong>Collects the 4% transfer fee</strong> — paid at registration by the buyer (though in practice it is often split or negotiated between parties)</li>
        <li><strong>Issues freehold ownership certificates</strong> to non-UAE nationals in designated freehold zones</li>
        <li><strong>Maintains the Oqood system</strong> (see below) for off-plan registration</li>
        <li><strong>Publishes market data</strong> — the DLD's transaction reports are the official source for all the statistics you'll use with clients</li>
      </ul>
      <div class="callout blue">
        <div class="callout-title">4% DLD transfer fee — know this cold</div>
        <p>The buyer pays 4% of the purchase price as a registration fee to the DLD. On a AED 1M property that's AED 40,000. On a AED 3M property, AED 120,000. Clients often forget this. You must always mention it proactively. There are also admin fees: AED 4,000 per unit for properties above AED 500K; AED 2,000 for below AED 500K.</p>
      </div>

      <h2>RERA — Real Estate Regulatory Agency</h2>
      <p>RERA is the regulatory arm of the DLD. It licenses agents, brokers, developers, and real estate companies. It sets the rules for advertising, contracts, escrow, and agent conduct.</p>
      <ul>
        <li><strong>RERA broker license (BRN)</strong> — required to legally transact in Dubai real estate. You need to be 21 to get this. You are currently operating under your agency's licensed broker.</li>
        <li><strong>RERA developer registration</strong> — developers must be registered and have an approved escrow account before launching any off-plan project</li>
        <li><strong>Certified Training for Real Estate Brokers (CTRB)</strong> — the exam you need to pass for your BRN at 21</li>
        <li><strong>Advertising rules</strong> — every listing requires a RERA-verified "Form A" or Form B (see below). Advertising without it can result in fines.</li>
        <li><strong>Landlord/tenant law</strong> — RERA governs rent increases via the Dubai Rent Calculator and mandates RERA-registered Tenancy Contracts (Ejari)</li>
      </ul>

      <h2>OQOOD — Off-Plan Registration System</h2>
      <p>OQOOD (Arabic for "contracts") is the DLD's mandatory registration platform for all off-plan property contracts. When a buyer purchases an off-plan unit, the SPA (Sales Purchase Agreement) must be registered in Oqood within 60 days of signing.</p>
      <ul>
        <li>Registration fee: <strong>4% of purchase price</strong> (same as ready property, paid at time of registration)</li>
        <li>Oqood registration protects the buyer — it creates a legal record before the property physically exists</li>
        <li>Without Oqood registration, the buyer has no legal protection if the developer defaults</li>
        <li>The system also tracks milestones — construction completion percentage is updated here and triggers payment schedule installments</li>
      </ul>

      <h2>Key legal forms you'll use daily</h2>
      <div class="table-wrap"><table>
        <tr><th>Form</th><th>What it is</th><th>Who signs</th></tr>
        <tr><td><strong>Form A</strong></td><td>Listing agreement — authorises you to market a seller's property</td><td>You + seller</td></tr>
        <tr><td><strong>Form B</strong></td><td>Buyer's agency agreement — authorises you to represent a buyer</td><td>You + buyer</td></tr>
        <tr><td><strong>Form F (MOU)</strong></td><td>Memorandum of Understanding — the agreement between buyer and seller on price, terms, and completion timeline. Non-binding but standard.</td><td>Buyer + seller (+ agents)</td></tr>
        <tr><td><strong>SPA</strong></td><td>Sales Purchase Agreement — the binding contract between buyer and developer (off-plan) or buyer and seller (secondary). Must be registered with DLD/Oqood.</td><td>Buyer + developer/seller</td></tr>
        <tr><td><strong>NOC</strong></td><td>No Objection Certificate — issued by the developer confirming the seller has no outstanding service charges or liabilities before DLD will process the transfer</td><td>Developer issues; seller obtains</td></tr>
        <tr><td><strong>Ejari</strong></td><td>Mandatory rental contract registration with RERA. Required for utilities connection and legal validity of the lease.</td><td>Landlord + tenant (agent facilitates)</td></tr>
        <tr><td><strong>POA</strong></td><td>Power of Attorney — authorises a representative to sign on behalf of a buyer or seller who cannot attend in person</td><td>Buyer or seller (notarised)</td></tr>
      </table></div>

      <h2>Other key authorities</h2>
      <ul>
        <li><strong>Dubai Courts / DIFC Courts</strong> — dispute resolution. Most residential cases go to Dubai Courts; DIFC is for international commercial disputes</li>
        <li><strong>DEWA</strong> — Dubai Electricity and Water Authority. Buyers must activate a DEWA account in their name for utilities. A DEWA deposit (AED 2,000–4,000 typically) is required at handover. Sellers must provide a final DEWA clearance certificate.</li>
        <li><strong>Dubai Municipality</strong> — building regulations, fire safety approvals, building completion certificates (BCC). A developer cannot hand over a unit without a BCC.</li>
        <li><strong>Strata / OA (Owners Association)</strong> — manages common areas in apartment buildings. Every unit owner pays annual service charges. OAs are regulated by RERA. Service charges range from AED 10–30+ per sqft per year depending on the building.</li>
        <li><strong>Dubai Tourism / DTCM</strong> — governs short-term rental (holiday home) licensing. Relevant if your buyers plan to Airbnb their units.</li>
      </ul>

      <div class="callout">
        <div class="callout-title">The escrow rule — critical for off-plan</div>
        <p>By law, all off-plan buyer payments must go into a RERA-registered escrow account held by an approved bank — not directly to the developer. Funds are released to the developer only as construction milestones are verified. This is your answer to every client who asks "but what if the developer disappears?"</p>
      </div>
    `

      <p>No income tax. No capital gains tax. No inheritance tax. No wealth tax. For a French national earning €200K/year, relocating to Dubai and restructuring legitimately saves €70–90K annually in tax alone. That saving frequently funds a property purchase. This is your opening argument with every French client.</p>

      <h3>2. Rental yields that beat the world</h3>
      <p>Dubai's average gross yield is approximately <strong>7.0% for apartments</strong> in 2025 — among the highest globally. Compare: London 3–4%, Paris 2–3%, New York 3–4%, Singapore 2.5–3%. Affordable areas deliver even more: International City 8.9%, Dubai Silicon Oasis 8.5%, JVC 7–8%. Even prime areas like Downtown (5%) and Palm Jumeirah (4.7%) beat most global equivalents.</p>

      <h3>3. Freehold ownership for foreigners</h3>
      <p>Since 2002, non-GCC nationals can own freehold property outright (100% ownership, no local partner required) in designated freehold zones covering most of the major development areas: Downtown, Marina, Palm Jumeirah, JVC, Business Bay, Dubai Hills, DAMAC Hills, JBR, Creek Harbour, and all major new developments.</p>

      <p>Invest AED 2 million+ in property and you qualify for a 10-year UAE Golden Visa. This is one of the most compelling offers globally for HNW individuals who want a Plan B residency without giving up their home country. Particularly powerful for French, Russian, and Chinese clients with political or tax-driven motivations to diversify residency.</p>

      <h3>5. Population growth driving real demand</h3>
      <p>Dubai's population crossed <strong>4 million in August 2025</strong>, growing at 6.1% year-on-year — one of the fastest rates of any major city globally. This is real residential demand, not just investor speculation. Workers, families, entrepreneurs, and retirees are all moving here. Every person needs somewhere to live, which supports rental yields and resale values.</p>

      <h3>6. Infrastructure investment at scale</h3>
      <p>The Dubai 2040 Urban Master Plan commits to expanding the city's urban footprint, adding five urban centres, expanding nature reserves to 60% of total area, and building infrastructure to support a population of 5.8M by 2040. Al Maktoum International Airport (Dubai South) is being expanded to eventually be the world's largest — a multi-decade catalyst for the south of the city.</p>

      <h3>7. Flight connectivity</h3>
      <p>Dubai is a 4-hour flight from 2/3 of the world's population. Emirates connects to 150+ destinations. This is why Dubai works as both a permanent base and a second home — it is genuinely accessible from everywhere. For investors who want to visit their property, this matters.</p>

      <h3>8. Off-plan payment plans — low entry barriers</h3>
      <p>Unlike most property markets where you need 20–30% upfront, Dubai developers routinely offer 10–20% down payment with the rest spread across construction (often 1% per month) and post-handover. This means a buyer can control a AED 1M asset for AED 100–200K upfront. For cash-constrained investors, this is transformative.</p>

      <p>Dubai property prices have risen 8–12% year-on-year across key areas in 2024–2025. Prime locations have outperformed: Jumeirah Golf Estates villas +48% YoY in Q3 2025. Villa markets in Palm Jumeirah, Emirates Hills, and MBR City have seen unprecedented demand from UHNW individuals. Off-plan prices at launch frequently deliver 15–30% appreciation before handover in active development zones.</p>

      <p>The AED is pegged to the USD at 3.67. This eliminates currency risk for USD-based investors and makes Dubai a safe-haven store of value for anyone escaping currency-volatile markets (Russia, Turkey, Egypt, Lebanon, Pakistan).</p>

      <h2>What a property consultant actually does</h2>
      <p>You are not an estate agent in the UK/France sense. You are a <strong>deal facilitator, market intelligence provider, and trusted advisor</strong> who connects capital to opportunity and gets paid when transactions complete. The best consultants don't just list properties — they build relationships that generate referrals for years.</p>

        <li><div class="step-content"><div class="step-title">Match buyer profile to project</div><div class="step-desc">Not every project suits every buyer. End-user vs investor. Capital appreciation vs rental yield. AED 800K vs AED 3M budget. You must know every project well enough to make the right match — or you lose the client.</div></div></li>

        <li><div class="step-content"><div class="step-title">Handle objections and follow up</div><div class="step-desc">Most buyers don't say yes on the first call. Industry average is 7–12 follow-up touchpoints before a decision. Track every lead in a CRM.</div></div></li>
        <li><div class="step-content"><div class="step-title">Get the EOI / reservation</div><div class="step-desc">Off-plan entry point is an Expression of Interest (EOI) or reservation deposit — typically AED 50,000–200,000 to hold the unit. This is your first closing moment.</div></div></li>
        <li><div class="step-content"><div class="step-title">Support through SPA signing</div><div class="step-desc">The developer sends the Sales Purchase Agreement. You ensure the client understands and signs. SPA must be registered with Oqood within 60 days.</div></div></li>
        <li><div class="step-content"><div class="step-title">Post-sale relationship</div><div class="step-desc">The best consultants stay in contact through handover, help with property management referrals, and generate re-sale or rental referral income later. One client well-served can be 3–5 future deals.</div></div></li>

      <h2>How you get paid (commission structure)</h2>

      </table></div>

      <div class="callout">
        <div class="callout-title">Your split at Habico</div>
        <p>You are on a 50% flat split. So on a AED 2M off-plan unit where the developer pays 3% commission (AED 60,000 gross), you receive AED 30,000. On a AED 5M unit at 3%, gross commission is AED 150,000 — you take AED 75,000. One deal like that covers your full year target. Two covers the next 2 years of university fees and then some.</p>
      </div>

      <h2>Lead-sharing and commission splits between agents</h2>
      <p>This is common practice and important to understand. The key rule: <strong>two agents split the commission, not the developer's rate.</strong></p>

      <div class="callout blue">

        <li><strong>They pick their developer relationships carefully</strong> and go deep rather than wide. Know one developer's full portfolio better than their own sales team.</li>
      </ul>

    content: () => `
      <h2>Why off-plan dominates Dubai</h2>
      <p>Off-plan accounted for <strong>72% of all residential transactions in Q1 2026</strong> (up from 68% in 2024). This isn't unique to Dubai — but the scale is. The reasons are structural:</p>
      <ul>
        <li>Developer payment plans allow buyers to control a AED 1M asset for AED 100K–200K upfront</li>
        <li>Off-plan prices are typically 15–25% below comparable ready units at the time of launch</li>
        <li>Capital appreciation during construction — in active zones like Business Bay, JVC, and Al Jaddaf, buyers who purchase at launch and sell at handover (2–3 years later) typically see 15–30% gains</li>
        <li>No mortgage needed — payment plans are developer-financed, accessible to anyone with the initial cash</li>
      </ul>

      <h2>The typical off-plan payment plan structures</h2>
      <div class="table-wrap"><table>
        <tr><th>Structure</th><th>How it works</th><th>Best for</th></tr>
        <tr><td><strong>20/80</strong></td><td>20% on booking, 80% on handover</td><td>Low cash commitment upfront. Client needs big cash at handover.</td></tr>
        <tr><td><strong>40/60</strong></td><td>40% during construction, 60% on handover</td><td>Moderate upfront. Balanced.</td></tr>
        <tr><td><strong>60/40</strong></td><td>60% during construction, 40% on handover</td><td>Higher upfront commitment but lower handover shock.</td></tr>
        <tr><td><strong>70/30 PHPP</strong></td><td>70% during construction, 30% post-handover over 2–3 years</td><td>Popular with Binghatti/DAMAC. Client moves in and pays the remainder.</td></tr>
        <tr><td><strong>1% monthly</strong></td><td>1% of total price per month during construction</td><td>Accessible. Binghatti Elite and similar. AED 1M = AED 10K/month.</td></tr>
      </table></div>

      <div class="callout">
        <div class="callout-title">Post-handover payment plans (PHPP) — your conversion tool</div>
        <p>PHPPs are the most powerful tool in off-plan sales. A client who can't afford AED 300K upfront can often afford AED 150K now and AED 150K spread over 24 months post-handover. They live in the property while paying the rest — essentially a developer-financed mortgage. Frame this as: "You pay like you're renting, but you own it from day one of handover."</p>
      </div>

      <h2>How a launch works</h2>
      <p>Off-plan launches in Dubai are engineered scarcity events. Understanding the mechanics makes you a better advisor and helps you create urgency with clients legitimately.</p>
      <ol class="step-list">
        <li><div class="step-content"><div class="step-title">Pre-launch / soft launch</div><div class="step-desc">Developer shares project details exclusively with preferred brokers 24–72 hrs before public launch. Units are available at the lowest prices — pre-launch pricing. This is your first-mover window. Get in here.</div></div></li>
        <li><div class="step-content"><div class="step-title">EOI collection</div><div class="step-desc">Brokers collect Expressions of Interest (EOIs) with a token deposit (AED 5,000–50,000 refundable) to gauge demand. EOI doesn't secure a specific unit — it puts the buyer in the queue.</div></div></li>
        <li><div class="step-content"><div class="step-title">Launch event</div><div class="step-desc">The developer hosts a launch — often in a hotel ballroom. Units are allocated from the EOI list. Prices are fixed on a price list. Best units go fast. This is when demand is highest and urgency is real.</div></div></li>
        <li><div class="step-content"><div class="step-title">Unit selection and reservation</div><div class="step-desc">Buyer selects floor, unit number, view. Reservation deposit (typically 10–20% of price) is paid to hold the unit. This locks the price and the unit for the buyer.</div></div></li>
        <li><div class="step-content"><div class="step-title">SPA preparation and signing</div><div class="step-desc">Developer prepares the formal Sales Purchase Agreement (usually within 1–4 weeks of reservation). Buyer reviews, signs. Legal document that binds both parties.</div></div></li>
        <li><div class="step-content"><div class="step-title">Oqood registration</div><div class="step-desc">SPA must be registered with DLD's Oqood system within 60 days of signing. This is mandatory and protects the buyer legally. Developer typically handles this — you confirm it happens.</div></div></li>
        <li><div class="step-content"><div class="step-title">Payment milestones</div><div class="step-desc">Construction progress triggers payment installments per the SPA schedule. Buyer receives update notifications. Most developers use an app or portal for milestone tracking.</div></div></li>
        <li><div class="step-content"><div class="step-title">Handover</div><div class="step-desc">When the unit is completed, the developer issues a completion notice. Buyer makes final payment, receives keys, activates DEWA, and takes possession. Title deed issued in buyer's name.</div></div></li>
      </ol>

      <h2>Pre-launch vs post-launch pricing</h2>
      <p>This is where the money is made. In a hot project, prices at launch are 10–20% below what they'll be 6 months later when the project is fully subscribed. For example: Binghatti Flare 01 sold 95% of 844 units within 90 days of launch. Buyers who got in at day 1 at AED 900K will likely see AED 1M+ pricing on the secondary market within 2 years. This is your core investor pitch.</p>

      <h2>Due diligence checklist — what to verify for every project</h2>
      <ul>
        <li><strong>Developer registration</strong> — verified on RERA's website. Check the developer's registration number and track record.</li>
        <li><strong>Escrow account</strong> — every project must have a RERA-approved escrow account at an approved bank. Ask for the escrow account number. Legitimate developers provide this instantly.</li>
        <li><strong>Building permit</strong> — the project must have a valid building permit from Dubai Municipality before sales begin.</li>
        <li><strong>Project approval</strong> — DLD must have approved the off-plan project registration.</li>
        <li><strong>Developer's previous delivery record</strong> — how many projects have they completed? On time? With what quality? Binghatti delivered 7 projects in 9 months of 2025 (20%+ of all Dubai completions). That's a track record.</li>
        <li><strong>Service charge disclosure</strong> — ask for the projected annual service charge per sqft. This is a material cost for buyers.</li>
      </ul>

      <h2>Flipping off-plan — what clients need to know</h2>
      <p>Off-plan units can be resold (flipped) before handover. This is legal and common in Dubai, subject to developer consent (NOC required) and DLD registration. Most developers allow transfer after 30–40% of the project price is paid. The seller typically pays a transfer fee of 1–2% plus the DLD 4%.</p>
      <p>If your client's strategy is to flip at handover, this is important: they need to sell before Oqood is converted to a title deed (i.e. before handover), otherwise VAT (5%) may apply if they're treated as a property developer. For individual investors flipping a single property, the tax position is generally exempt — but advise them to take independent legal advice.</p>

      <h2>Off-plan sales psychology and conversion</h2>
      <p>The off-plan sale is an emotion-first, logic-second decision. The buyer is buying something that doesn't exist yet. Your job is to make the future feel real and inevitable.</p>

      <h3>The 5 drivers that close off-plan deals</h3>
      <ul>
        <li><strong>FOMO (Fear of Missing Out).</strong> Real projects sell fast. "We had 400 units. 350 are already reserved. The only remaining floors are 18–22." This is only powerful if it's true — but when it is, use it explicitly.</li>
        <li><strong>The payment plan as a lifestyle unlock.</strong> "You're paying AED 12,000 per month in rent now. Your payment on this unit would be AED 10,000 per month during construction — and at handover you own it." Rent vs own math always helps.</li>
        <li><strong>The yield story.</strong> "If you buy this AED 800K studio in JVC and put it on Airbnb, comparable units are generating AED 70–80K per year. That's a 9% gross yield on your investment."</li>
        <li><strong>The appreciation thesis.</strong> Show them a comparable project from the same developer or same area that launched 3 years ago and what those units are worth today. Track record is your most powerful tool.</li>
        <li><strong>Simplicity.</strong> The buyer is often overwhelmed. Walk them through exactly what they need to do: "Step 1, give me a AED 50,000 deposit to hold the unit — fully refundable for 7 days. Step 2, you review the SPA with me. Step 3, we register it. You're done until the first payment installment." Make the next step feel tiny.</li>
      </ul>

      <h2>Common objections and responses</h2>
      <div class="table-wrap"><table>
        <tr><th>Objection</th><th>Response</th></tr>
        <tr><td>"I need to think about it"</td><td>"Of course. What specifically is holding you back? Is it the price, the developer, the location, or the timing? Let's address whatever it is right now so you have everything you need."</td></tr>
        <tr><td>"What if the developer doesn't deliver?"</td><td>"All payments go into a RERA-regulated escrow — the developer can't touch the money until construction milestones are verified. If they default, RERA can appoint a new developer to complete the project. This isn't 2008."</td></tr>
        <tr><td>"The price is too high"</td><td>"Compared to what? Ready units in Business Bay are AED 2,200/sqft. This is AED 1,500/sqft with a 3-year construction timeline. You're buying at today's price with appreciation built in."</td></tr>
        <tr><td>"I want to wait for prices to drop"</td><td>"Dubai prices have risen 18% year-on-year. They haven't dropped meaningfully since 2014. Every month you wait, the same unit costs more. The question isn't if, it's how much more you'll pay if you wait 12 months."</td></tr>
      </table></div>
    `

      <h2>What the secondary market is</h2>
      <p>The secondary market (also called the ready market) is any property that already exists — fully built, titled, and available for immediate occupancy or rental. You are buying from a private seller (or sometimes a developer's own stock of completed units), not directly from a developer at launch pricing.</p>
      <p>Secondary accounted for approximately <strong>28% of Dubai transactions in Q1 2026</strong> (72% off-plan, 28% ready). While off-plan dominates by volume, the secondary market represents the bulk of high-value luxury transactions (AED 3M+) and is the only option for buyers who need immediate occupancy.</p>

      <div class="table-wrap"><table>
        <tr><th>Factor</th><th>Off-plan</th><th>Secondary</th></tr>

        <tr><td>Buyer profile</td><td>Investors, capital appreciation focus</td><td>End-users, income investors, buyers needing immediate rental</td></tr>
        <tr><td>Mortgage</td><td>Rare for off-plan</td><td>Common — up to 80% LTV for expats</td></tr>
        <tr><td>Price negotiation</td><td>Usually fixed at launch</td><td>Fully negotiable — seller motivation matters</td></tr>
      </table></div>

      <h2>How a secondary sale works — step by step</h2>
      <ol class="step-list">
        <li><div class="step-content"><div class="step-title">Listing and Form A</div><div class="step-desc">You obtain Form A from the seller — the exclusive listing agreement authorising you to market their property. Without Form A you cannot legally advertise the property in Dubai.</div></div></li>
        <li><div class="step-content"><div class="step-title">Viewings and buyer matching</div><div class="step-desc">You market the property (Property Finder, Bayut, social, your network) and conduct viewings. All viewings should be logged.</div></div></li>
        <li><div class="step-content"><div class="step-title">Offer and negotiation</div><div class="step-desc">Buyer submits an offer — usually verbally at first, then in writing. You negotiate between parties. A 3–5% discount from asking is typical in the current market; less in hot properties.</div></div></li>
        <li><div class="step-content"><div class="step-title">MOU (Form F)</div><div class="step-desc">Both parties sign the Memorandum of Understanding (Form F). Buyer pays a 10% deposit cheque — typically held by the agent or put in escrow. This signals serious intent. The cheque is post-dated to the transfer date.</div></div></li>
        <li><div class="step-content"><div class="step-title">NOC from developer</div><div class="step-desc">The seller obtains a No Objection Certificate from the building's developer/OA confirming no outstanding service charges. Takes 5–14 days typically and costs AED 500–5,000 depending on developer.</div></div></li>

        <li><div class="step-content"><div class="step-title">DLD transfer appointment</div><div class="step-desc">All parties attend the DLD (or authorised typing centre). Buyer brings manager's cheques: one for the seller (purchase price minus deposit), one for DLD (4% transfer fee + admin fees). Deed transferred in buyer's name. Deal done.</div></div></li>
      </ol>

      <h2>Mortgage basics (for secondary buyers)</h2>
      <ul>
        <li>UAE residents: maximum 80% LTV (20% deposit) for first property up to AED 5M; 70% for above AED 5M</li>

    content: () => `
      <h2>Residential rentals</h2>
      <p>Residential leasing is regulated by RERA under Law No. 26 of 2007 (and subsequent amendments). All residential tenancy contracts must be registered on the Ejari system. Rentals are typically your entry point for building a relationship with a future buyer — someone renting today is a buyer in 2–3 years.</p>

      <h3>Key rental facts to know</h3>
      <ul>
        <li><strong>Cheque culture</strong> — rent is paid in advance by post-dated cheques. 1 cheque (full year upfront) earns a discount vs 4 cheques (quarterly). Some landlords accept 6 cheques. Cash is rare.</li>
        <li><strong>Security deposit</strong> — typically 5% of annual rent (refundable at end of tenancy). Furnished units: 10%.</li>
        <li><strong>Rent increases</strong> — governed by RERA's Rental Increase Calculator. Landlord can only increase rent based on the difference between the current rent and the RERA index for that area. If current rent is at or above 90% of market index, increase = 0%. This is frequently misunderstood — know the calculator.</li>
        <li><strong>Ejari registration</strong> — mandatory. Both parties need to register the tenancy contract. Required for DEWA connection, visa applications, and any legal dispute.</li>
        <li><strong>Notice periods</strong> — landlord must give 12 months notice to evict for personal use or major renovation; 3 months for non-renewal at standard end of term.</li>
      </ul>

      <h3>Rental commission</h3>
      <p>Standard: 5% of annual rent. Paid by landlord. On a AED 100,000/year 1BR in JVC, that's AED 5,000 per deal. Rental volume is how newer agents build income while learning the market. If you generate 3–4 rental deals per month at an average of AED 5,000–8,000, that's AED 15,000–32,000/month in gross commission — respectable while you develop bigger off-plan relationships.</p>

      <h2>Commercial leasing</h2>
      <p>Commercial leasing covers offices, retail units, warehouses, and co-working spaces. Regulated differently from residential — less tenant protection, more negotiable terms. Commission is typically 5–10% of annual rent. Free zones (DIFC, DMCC, Media City, JLT) have their own authority regulations.</p>
      <ul>
        <li>Key free zones: DIFC (finance), DMCC (commodities), Dubai Media City (media), Dubai Internet City (tech), Jebel Ali (logistics), DAFZA (airport)</li>
        <li>Mainland vs free zone: mainland allows operating in UAE market directly; free zone allows 100% foreign ownership but has restrictions on operating in mainland</li>
        <li>Commercial tenants often want Ejari equivalent for their business license renewal</li>
      </ul>

      <h2>Holiday homes (short-term rental)</h2>
      <p>Holiday home operators license through Dubai Tourism (DTCM). Units must be registered and operators must be licensed. Average holiday home revenue in Dubai Marina: AED 150,000–250,000/year (vs AED 90,000–120,000 for long-term). Higher revenue but more management overhead. Several management companies handle this for 20–25% of gross revenue. For buyers asking about Airbnb potential, Dubai is fully legal and the yields are compelling.</p>

      <h2>Land and plots</h2>
      <p>Vacant plots for development. Commercial and residential. Available in freehold zones to foreigners. Entry from AED 500K upward. Used by developers (large plots) and individuals (smaller plots for custom builds or flipping with planning approval). Plots are measured in sqft of plot area; value depends on GFA (Gross Floor Area) permitted under the master plan. Plot transactions are specialist — not a day-one focus.</p>

      <h2>Warehouses and industrial</h2>
      <p>Jebel Ali, Al Quoz, Dubai Industrial City, DIC. High demand from logistics, manufacturing, e-commerce. Leases typically 1–3 years. Commission: 5–8% of annual rent. You need specialist knowledge of industrial zones to play here. Not a priority at your stage but worth knowing exists.</p>

      <h2>Summary: where to focus your early energy</h2>
      <div class="callout green">
        <div class="callout-title">Priority stack for a new consultant</div>
        <p>Off-plan first — highest commission, fastest learning, best margin. Rentals second — builds client relationships and generates income while you develop bigger deals. Secondary third — when you have the experience and a buyer who needs immediate occupancy. Commercial/industrial — down the line, requires specialist knowledge. Plot sales — specialist, not your immediate lane.</p>
      </div>
    `

      <h3>How to network effectively</h3>

        <li><strong>Lead with value, not your pitch.</strong> Ask questions about what they do, what they're investing in, what their Dubai experience has been. People who feel listened to remember you.</li>

let currentChapter = 0;
let completed = new Set();

function renderSidebar() {
  const list = document.getElementById('chapterList');
  list.innerHTML = CHAPTERS.map((ch, i) => `
    <button class="chapter-btn ${i === currentChapter ? 'active' : ''} ${completed.has(i) ? 'completed' : ''}" onclick="goTo(${i})">
      <span class="ch-num">${completed.has(i) ? '✓' : String(i + 1).padStart(2, '0')}</span>
      <span class="ch-name">${ch.title}</span>
    </button>
  `).join('');
  const pct = Math.round((completed.size / CHAPTERS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${completed.size} of ${CHAPTERS.length} chapters complete`;
}

function renderChapter(i) {
  const ch = CHAPTERS[i];
  const isFirst = i === 0;
  const isLast = i === CHAPTERS.length - 1;
  const isDone = completed.has(i);
  const quizBlock = ch.isFinalExam ? '' : quizHTML(i);
  document.getElementById('chapterContent').innerHTML = `
    <div class="chapter-view">
      <div class="chapter-eyebrow">Chapter ${i + 1} of ${CHAPTERS.length}</div>
      <h1 class="chapter-title">${ch.title}</h1>
      <p class="chapter-subtitle">${ch.subtitle}</p>
      ${ch.content()}
      ${quizBlock}
      <div class="nav-bar">
        ${!isFirst ? `<button class="nav-btn" onclick="goTo(${i - 1})">← Previous</button>` : '<div></div>'}
        <button class="mark-done" onclick="markDone(${i})">${isDone ? '✓ Completed' : 'Mark complete'}</button>
        ${!isLast ? `<button class="nav-btn primary" onclick="goTo(${i + 1})">Next →</button>` : '<div></div>'}
      </div>
    </div>
  `;
  renderCharts(i);
  document.getElementById('main').scrollTo(0, 0);
  // Init quiz for this chapter
  if (ch.isFinalExam) {
    setTimeout(() => { initFinalExam(); initExamProgress(); }, 100);
  } else {
    setTimeout(() => { initQuiz(i); }, 100);
  }
}

function initExamProgress() {
  const questions = FINAL_EXAM;
  const state = window['quizState_finalExam'];
  function update() {
    if (!state) return;
    const answered = state.filter(s => s.answered).length;
    const pct = Math.round(answered / questions.length * 100);
    const fill = document.getElementById('examFill');
    const label = document.getElementById('examLabel');
    if (fill) fill.style.width = pct + '%';
    if (label) label.textContent = answered + ' / ' + questions.length + ' answered';
  }
  // Poll progress
  window._examInterval = setInterval(update, 500);
}

function goTo(i) {
  currentChapter = i;
  renderSidebar();
  renderChapter(i);
}

function markDone(i) {
  if (completed.has(i)) { completed.delete(i); } else { completed.add(i); }
  renderSidebar();
  renderChapter(i);
}

function renderQuiz(questions, containerId) {
  const state = questions.map(function() { return {answered: false, selected: -1}; });
  window['quizState_' + containerId] = state;
  window['quizQ_' + containerId] = questions;

  function buildBlock(qi) {
    var q = questions[qi];
    var s = state[qi];
    var html = '<div class="q-block" id="q-' + containerId + '-' + qi + '">';
    html += '<div class="q-num">Question ' + (qi + 1) + '</div>';
    html += '<div class="q-text">' + q.q + '</div>';
    html += '<div class="q-options">';
    var letters = ['A','B','C','D'];
    for (var oi = 0; oi < q.opts.length; oi++) {
      var cls = '';
      if (s.answered) {
        if (oi === q.a) cls = ' correct';
        else if (oi === s.selected) cls = ' wrong';
      }
      var dis = s.answered ? ' disabled' : '';
      html += '<button class="q-opt' + cls + '"' + dis + ' onclick="answerQ(\'' + containerId + '\',' + qi + ',' + oi + ')">';
      html += '<span class="opt-letter">' + letters[oi] + '</span>';
      html += '<span>' + q.opts[oi] + '</span>';
      html += '</button>';
    }
    html += '</div>';
    if (s.answered) {
      var correct = s.selected === q.a;
      html += '<div class="q-explanation"><strong>' + (correct ? '✓ Correct.' : '✗ Incorrect.') + '</strong> ' + q.exp + '</div>';
    }
    html += '</div>';
    return html;
  }

  function renderAll() {
    var html = '';
    for (var i = 0; i < questions.length; i++) {
      html += buildBlock(i);
    }
    document.getElementById(containerId).innerHTML = html;
  }

  renderAll();
}

window.answerQ = function(containerId, qi, oi) {
  var state = window['quizState_' + containerId];
  var questions = window['quizQ_' + containerId];
  if (!state || state[qi].answered) return;
  state[qi].answered = true;
  state[qi].selected = oi;

  var block = document.getElementById('q-' + containerId + '-' + qi);
  var opts = block.querySelectorAll('.q-opt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].disabled = true;
    if (i === questions[qi].a) opts[i].classList.add('correct');
    else if (i === oi) opts[i].classList.add('wrong');
  }
  var exp = document.createElement('div');
  exp.className = 'q-explanation';
  var correct = oi === questions[qi].a;
  exp.innerHTML = '<strong>' + (correct ? '✓ Correct.' : '✗ Incorrect.') + '</strong> ' + questions[qi].exp;
  block.appendChild(exp);

  // Score display
  var allDone = state.every(function(s, i) { return s.answered; });
  if (allDone) {
    var score = 0;
    for (var j = 0; j < questions.length; j++) {
      if (state[j].selected === questions[j].a) score++;
    }
    var total = questions.length;
    var scoreEl = document.getElementById('score-' + containerId);
    if (scoreEl) {
      scoreEl.style.display = 'flex';
      scoreEl.querySelector('.q-score-val').textContent = score + '/' + total;
      var pct2 = Math.round(score / total * 100);
      var label = pct2 === 100 ? 'Perfect!' : pct2 >= 80 ? 'Strong pass' : 'Keep reviewing';
      scoreEl.querySelector('.q-score-label').textContent = pct2 + '% — ' + label;
    }
    if (containerId === 'finalExam') {
      var pct = Math.round(score / total * 100);
      var grade = pct >= 90 ? 'Distinction' : pct >= 75 ? 'Pass' : pct >= 60 ? 'Borderline — keep studying' : 'Needs more study';
      var colour = pct >= 90 ? 'var(--gold)' : pct >= 75 ? 'var(--green)' : pct >= 60 ? 'var(--accent)' : 'var(--red)';
      var card = document.getElementById('finalScoreCard');
      if (card) {
        card.style.display = 'block';
        card.querySelector('.final-score-pct').textContent = pct + '%';
        card.querySelector('.final-score-pct').style.color = colour;
        card.querySelector('.final-score-sub').textContent = score + ' correct out of ' + total + ' questions';
        card.querySelector('.final-grade').textContent = grade;
        card.querySelector('.final-grade').style.color = colour;
        card.scrollIntoView({ behavior: 'smooth' });
      }
    }
  }

  // Update exam progress bar if in final exam
  if (containerId === 'finalExam') {
    var answered = state.filter(function(s) { return s.answered; }).length;
    var fill = document.getElementById('examFill');
    var lbl = document.getElementById('examLabel');
    if (fill) fill.style.width = Math.round(answered / questions.length * 100) + '%';
    if (lbl) lbl.textContent = answered + ' / ' + questions.length + ' answered';
  }
};

function quizHTML(chapterIndex) {
  var questions = CHAPTER_QUIZZES[chapterIndex];
  if (!questions) return '';
  var cid = 'quiz_ch_' + chapterIndex;
  return '<div class="quiz-section">'
    + '<div class="quiz-header">'
    + '<div class="quiz-title">Chapter review — 5 questions</div>'
    + '<div class="quiz-subtitle">Test what you just read. Explanations show for every answer.</div>'
    + '</div>'
    + '<div class="q-score-bar" id="score-' + cid + '" style="display:none">'
    + '<div><div class="q-score-val"></div><div class="q-score-label"></div></div>'
    + '</div>'
    + '<div id="' + cid + '"></div>'
    + '</div>';
}

function initQuiz(chapterIndex) {
  var questions = CHAPTER_QUIZZES[chapterIndex];
  if (!questions) return;
  var cid = 'quiz_ch_' + chapterIndex;
  renderQuiz(questions, cid);
}

function initFinalExam() {
  renderQuiz(FINAL_EXAM, 'finalExam');
}
