      <h2>Why transaction timelines matter more than you think</h2>
      <p>Most agents know the broad strokes of how a deal closes but cannot walk a client through the precise sequence of events, who does what, in what order, and how long each step takes. This gap costs deals at the exact moment it shouldn't. When a buyer who is nearly ready to commit asks "okay, so what happens after I transfer the deposit?" — a vague or uncertain answer from you creates doubt at the worst possible moment. A precise, step-by-step answer — told with calm authority — does the opposite. It signals that you have done this before, that the process is well-understood, and that the client is in safe hands. Transaction process knowledge is therefore not just operational competence. It is a closing tool.</p>
      <p>Dubai has several distinct transaction scenarios, and each has its own sequence. An off-plan purchase from a developer at launch is different from a secondary resale, which is different from a mortgage-backed secondary purchase, which is different from a corporate or Power of Attorney purchase. Knowing each scenario in sequence — and knowing what can go wrong at each step — is what a professional knows that a part-time or order-taking agent does not. This chapter maps all the primary scenarios.</p>

      <h2>Scenario 1 — Off-plan purchase (individual investor, cash)</h2>
      <p>This is your most common scenario at Habico and the one you need to know in the most detail. The buyer is an individual paying via developer payment plan with no mortgage involved.</p>
      <ol class="step-list">
        <li><div class="step-content"><div class="step-title">EOI and reservation deposit — Day 0</div><div class="step-desc">Client submits Expression of Interest with a refundable token deposit (AED 5,000–50,000) to secure a queue position at the launch event. If post-launch, client pays a full reservation deposit (typically 10–20%) to hold a specific unit. Timeline from this point: SPA preparation begins.</div></div></li>
        <li><div class="step-content"><div class="step-title">SPA preparation — Days 1 to 28</div><div class="step-desc">Developer's legal team prepares the Sales Purchase Agreement. For major developers (Binghatti, DAMAC, Emaar), this typically takes 7–21 days from reservation. SPA is sent to the buyer (and to you as their agent) for review. The SPA specifies: unit number, floor, size, price, payment schedule, handover date, developer obligations and penalties, buyer obligations and penalties for late payment.</div></div></li>
        <li><div class="step-content"><div class="step-title">SPA review and signing — Days 10 to 35</div><div class="step-desc">Client reviews the SPA — recommend independent legal review for first-time buyers. Key clauses to check: payment schedule matches what was promised at launch, handover date has a reasonable grace period (typically 6 months), specification schedule matches the brochure. Client signs physically or via digital signature platform. Developer countersigns. First installment payment may be due at SPA signing if not already paid as reservation.</div></div></li>
        <li><div class="step-content"><div class="step-title">Oqood registration — Days 14 to 60</div><div class="step-desc">Developer submits the signed SPA to DLD for Oqood registration. The 4% DLD transfer fee is collected at this point (paid by buyer). DLD issues the Oqood certificate — the buyer's legal ownership record. The developer cannot legally sell the unit to anyone else from this point. Your commission is typically released to Habico at Oqood registration.</div></div></li>
        <li><div class="step-content"><div class="step-title">Construction-period payments — Months 1 to 30+ (project dependent)</div><div class="step-desc">Payments become due per the SPA schedule — either time-based (every quarter) or milestone-based (at foundation completion, at superstructure, at MEP, etc.). The developer draws these payments from the escrow account only when an independent engineer confirms each milestone. Track each due date and remind clients 2 weeks ahead to arrange funds. Late payments carry interest charges under the SPA — typically 1% per month.</div></div></li>
        <li><div class="step-content"><div class="step-title">Completion notice and final payment</div><div class="step-desc">Developer issues a completion notice when the building has received its Building Completion Certificate (BCC) from Dubai Municipality. The final payment tranche is then due. Typically 10% or whatever the handover installment is per the SPA. Client should arrange funds before this notice arrives — the window to pay can be as short as 30 days.</div></div></li>
        <li><div class="step-content"><div class="step-title">Snagging inspection</div><div class="step-desc">Before formally accepting handover, the buyer (or their representative) inspects the unit against the specification schedule in the SPA. Any defects, missing items, or finishes that don't match the contract are recorded on a snagging list and submitted to the developer. Developer addresses snags — typically within 30–60 days for minor items. The buyer has the right under UAE law to withhold final handover acceptance until snags are addressed. For buyers who are overseas, appoint a trusted local representative or professional snagging company (fees approximately AED 1,500–3,000).</div></div></li>
        <li><div class="step-content"><div class="step-title">Handover — keys collected</div><div class="step-desc">Buyer activates DEWA account (AED 2,000–4,000 security deposit to DEWA). Keys collected from the developer. Oqood certificate converts to a full title deed issued by DLD in the buyer's name. The buyer is now a Dubai property owner. Follow up immediately to discuss property management options or rental strategy — this is the moment you lock in the next transaction relationship.</div></div></li>
      </ol>

      <h2>Scenario 2 — Secondary purchase (cash buyer)</h2>
      <p>This is the most common secondary scenario — a cash buyer purchasing a ready property from a private seller. The total timeline from offer agreed to keys in hand is typically 30–60 days.</p>
      <ol class="step-list">
        <li><div class="step-content"><div class="step-title">Offer agreed verbally</div><div class="step-desc">Buyer and seller agree on a price verbally (usually via their respective agents). Before anything is signed, the buyer should conduct a physical inspection of the unit and confirm any included items (furniture, appliances if furnished). The verbal agreement is not binding — either party can walk away at this stage.</div></div></li>
        <li><div class="step-content"><div class="step-title">MOU / Form F signed — Day 0 to 3</div><div class="step-desc">Both parties sign the Memorandum of Understanding within a few days of verbal agreement. Buyer provides a 10% deposit cheque (or manager's cheque) to the seller's agent or into a joint escrow arrangement. This creates a binding commitment. Completion date is set in the MOU — typically 30–60 days from signing. If either party backs out without cause after MOU, penalties apply.</div></div></li>
        <li><div class="step-content"><div class="step-title">NOC application by seller — Days 1 to 14</div><div class="step-desc">Seller applies to the developer or OA for the No Objection Certificate. This involves clearing any outstanding service charges, maintenance fees, or liabilities on the unit. NOC fee: AED 500–5,000. Processing time: 5–14 days typically. Until the NOC is issued, the DLD will not process a transfer. Start the NOC process the day after MOU is signed to avoid eating into your transfer timeline.</div></div></li>
        <li><div class="step-content"><div class="step-title">Transfer appointment at DLD — Day 30 to 60</div><div class="step-desc">Both buyer and seller (or their POA holders) attend a DLD service centre — the most common is Al Manara Centre in Jumeirah. Buyer brings manager's cheques: one payable to the seller for the agreed price minus the 10% deposit already held, and one payable to DLD for the 4% transfer fee plus admin fees. Seller presents the original title deed and the NOC. Both agents present their commission cheques (signed by buyer and seller respectively). DLD processing: 1–2 hours. New title deed issued to buyer on the same day.</div></div></li>
        <li><div class="step-content"><div class="step-title">Post-transfer — DEWA and handover</div><div class="step-desc">Seller provides a DEWA clearance certificate confirming no outstanding balance. Buyer activates a new DEWA account. Physical handover of keys occurs on the same day as the DLD transfer or immediately after. If the property is tenanted, the buyer inherits the tenancy and the seller transfers the security deposit to the buyer.</div></div></li>
      </ol>

      <h2>Scenario 3 — Secondary purchase with mortgage</h2>
      <p>The mortgage process adds complexity and significantly extends the timeline. Total timeline: 45–90 days from offer to keys.</p>

      <div class="table-wrap"><table>
        <tr><th>Step</th><th>Who does it</th><th>Timeline</th><th>What can go wrong</th></tr>
        <tr><td>Pre-approval letter obtained</td><td>Buyer, before offer</td><td>Before viewings</td><td>Bank refuses — buyer is unfinanceable at this property value</td></tr>
        <tr><td>Offer agreed + MOU signed</td><td>Both agents</td><td>Days 1–3</td><td>Verbal agreement on price before valuation — risk if valuation comes in lower</td></tr>
        <tr><td>Bank valuation</td><td>Bank-appointed valuer</td><td>Days 5–10</td><td>Valuation below agreed price — buyer must top up the gap in cash</td></tr>
        <tr><td>Final loan approval</td><td>Bank</td><td>Days 10–30</td><td>Change in buyer's employment or financial situation causes approval to be withdrawn</td></tr>
        <tr><td>NOC from developer</td><td>Seller</td><td>Days 1–14 (runs parallel)</td><td>Outstanding charges delay NOC — compresses transfer window</td></tr>
        <tr><td>Liability letter from seller's bank</td><td>Seller (if mortgaged)</td><td>Days 1–14</td><td>Seller's bank requires settlement of existing mortgage before NOC — can delay or block</td></tr>
        <tr><td>DLD transfer + mortgage registration</td><td>All parties at DLD</td><td>Day 45–90</td><td>Any outstanding step above incomplete — appointment rescheduled</td></tr>
      </table></div>

      <h2>Scenario 4 — Power of Attorney purchase</h2>
      <p>International buyers who cannot be physically present in Dubai to sign documents use a Power of Attorney (POA) to authorise a representative to sign on their behalf. This is extremely common for Francophone investors who are purchasing from France, Morocco, or elsewhere. Understanding the mechanics prevents delays caused by improperly prepared POAs.</p>
      <ul>
        <li><strong>POA preparation:</strong> The buyer signs the POA document in their home country before a local notary. The document must be in English (or Arabic) and specifically authorise the named person to purchase a named property (or to purchase real estate in Dubai generally, depending on the scope).</li>
        <li><strong>Apostille:</strong> In France and most EU countries, the notarised POA must then be apostilled — a specific government stamp that confirms the notary's authority under the Hague Apostille Convention. Apostilles in France are issued by the Ministry of Justice or relevant Cour d'Appel.</li>
        <li><strong>Arabic translation:</strong> The apostilled POA must be translated into Arabic by a UAE Ministry of Justice-certified legal translation office. Cost: AED 300–600. Processing: 1–3 days.</li>
        <li><strong>DLD acceptance:</strong> The DLD accepts properly notarised, apostilled, and translated POAs for transfer purposes. The POA holder attends the transfer appointment in place of the buyer. The original title deed is issued in the buyer's name regardless of who signs.</li>
        <li><strong>POA expiry:</strong> Most POAs are valid for 2 years. If a deal takes longer than expected, check the POA has not expired before the transfer appointment.</li>
        <li><strong>Your role:</strong> Guide your French clients through this process proactively. Many first-time Dubai buyers don't know what a UAE-valid POA requires. Providing them with a clear checklist — what to ask their French notaire, how to get the apostille, where to get the Arabic translation in Dubai — positions you as genuinely knowledgeable and removes a significant obstacle to closing.</li>
      </ul>

      <div class="callout">
        <div class="callout-title">The timeline you send clients before they commit</div>
        <p>Before any client commits, send them a WhatsApp timeline summary: "Here is exactly what happens from today to keys in hand — [Day 0: reservation deposit, Day 7–21: SPA sent to you for review, Day 21–35: SPA signed, Day 35–60: Oqood registered — your ownership is legally confirmed, then quarterly payments per schedule, estimated handover: Q4 2027]." Clients who understand the process feel in control. Clients who feel in control commit. Clients who are confused and uncertain delay until their fear dissolves — which it often doesn't.</p>
      </div>

      <h2>Common deal-killers and how to prevent them</h2>
      <p>Most deal failures in Dubai real estate are preventable. They cluster around a small set of recurring causes that experienced agents see coming and address before they become problems:</p>
      <ul>
        <li><strong>Delayed NOC (secondary only):</strong> Start the NOC application on the day the MOU is signed, not the week before transfer. Outstanding service charges that the seller didn't know about are the most common cause of NOC delays — ask the seller for a recent service charge statement before MOU so there are no surprises.</li>
        <li><strong>Mortgage valuation shortfall:</strong> If you suspect a mortgage buyer's agreed price is above what a bank valuer will confirm, inform the buyer before MOU that they may need to top up in cash. Buyers who discover this after MOU signing sometimes cannot complete — the deposit is at risk and the deal collapses.</li>
        <li><strong>SPA clause dispute:</strong> SPA clauses that don't match what was presented at the launch are the most common developer-related grievance. Review the SPA payment schedule against the launch brochure before your client signs. Any discrepancy must be raised with the developer's legal team before signing — not after.</li>
        <li><strong>Buyer funding delays:</strong> International wire transfers can take 3–5 business days and sometimes longer if the sending bank applies additional compliance checks. Remind clients to initiate transfers at least 7 business days before any payment due date — never the day before.</li>
        <li><strong>Late final payment:</strong> Off-plan SPA contracts typically charge 1% per month interest on late payments and give the developer the right to terminate the SPA if payment is more than 30–60 days late. Track every client's payment schedule in your CRM and send reminders 3 weeks before each due date.</li>
      </ul>
    `

      <h2>The lead generation problem most new agents get wrong</h2>
      <p>New consultants in Dubai almost universally make the same mistake: they try to do everything simultaneously. They post on Instagram, set up on Bayut, attend every developer event, try cold calling, run WhatsApp blasts — and six months later have done all of these things inconsistently and mastered none of them. The lead generation channels that work in Dubai real estate are not equally valuable, and they require very different skills and time commitments. Your first year should be about identifying two or three channels that fit your skills and market positioning, and going deep on them rather than spreading attention across every possible channel.</p>
      <p>Given your background, those primary channels are: social media (you already know how to build and grow platforms, and the French-language Dubai real estate niche is nearly empty), developer events (direct access to motivated buyer pools who are already in the research phase), and Francophone community networking (your geographic and language advantage that no competitor can easily replicate). Everything else is secondary until these three are producing consistent results. Depth on the right channels beats breadth across the wrong ones every time.</p>

      <h2>Lead generation vs lead conversion — understanding the difference</h2>
      <p>Lead generation is the front end of your business — getting people to raise their hand and express interest. Lead conversion is the back end — taking those expressions of interest through qualification, pitch, objection handling, and follow-up until a deal closes. Many agents generate reasonable volumes of leads and convert almost none of them because their conversion process is weak: slow response times, generic pitches, inconsistent follow-up, and no real objection handling. Both sides matter equally. A large number of weakly-converted leads produces the same revenue as a small number of well-converted leads. Work on both simultaneously from day one.</p>

      <p>More Dubai real estate deals are closed on WhatsApp than any other channel. WhatsApp Business gives you professional features: a business profile with your photo and title, auto-reply messages for when you're unavailable, quick-reply shortcuts, and broadcast lists for segmented audiences. Set up properly, it is the hub of your client communication system.</p>
      <ul>
        <li><strong>Profile:</strong> Professional headshot, title ("Property Consultant — Binghatti & DAMAC Specialist | Habico Real Estate"), language note (Français/English) in your About section.</li>
        <li><strong>Auto-reply:</strong> "Merci pour votre message / Thank you for reaching out. I'm Thomas, property consultant at Habico specialising in Binghatti and DAMAC off-plan. I'll respond within 30 minutes during business hours." Sets expectations and sounds professional.</li>

      <p>Industry data shows that 80% of deals close after the fifth follow-up, but the majority of agents stop after the second or third contact. The gap between those numbers is your competitive advantage if you close it. Run a structured 7-touch follow-up sequence on every qualified lead. Log every touch. Set a calendar reminder for the next touch. Treat every "no" as a "not yet" — a quiet client is not a dead lead. They are often still in the research phase and haven't yet had the right trigger to commit. Your consistent presence becomes that trigger.</p>

        <p>Touch 1 (same day): WhatsApp — thank you + project brochure PDF.<br>
        Touch 2 (day 2–3): Phone call — confirm receipt, ask if they have questions.<br>
        Touch 3 (day 5–7): WhatsApp — relevant market stat or area news, casual check-in.<br>
        Touch 4 (day 10–14): Phone call — new angle: payment plan walkthrough or comparable deal nearby.<br>
        Touch 5 (day 21): WhatsApp — project update: unit availability narrowing, price movement.<br>
        Touch 6 (day 30): Phone call — "I have another client considering the same unit. Wanted to give you first right of refusal."<br>

      </div>

    content: () => `
      <h2>Networking in Dubai — how it actually works</h2>
      <p>Dubai is socially compact in a way that surprises people from larger cities. Despite having 4 million residents, the community of HNW professionals, entrepreneurs, and serious investors who make up your primary buyer pool overlaps significantly. The same 200–300 people appear at CCI France events, DAMAC launch nights, Business Bay brunches, and premium gym classes. You do not need to know 10,000 people to build a strong deal pipeline — you need to know 200 of the right people well. One relationship at the right level can send you 10 qualified buyers over two years. The maths rewards depth of network over breadth.</p>
      <p>The most important networking principle that most people violate is pitching too early. Dubai's business culture, particularly in the Francophone community, is relationship-first. A French entrepreneur who has just met you is not ready to hand you an AED 2M investment decision. They need to know you, trust you, and have some evidence that you deliver before they consider your recommendations seriously. The early stages of any networking relationship should be entirely focused on understanding the other person — their business, their Dubai story, their investment thinking — and providing value without any expectation of immediate return. People who sprint to the pitch within the first three minutes consistently report "bad luck" with networking. They don't have bad luck. They have an approach that repels the very people they are trying to attract.</p>

      <h2>Where to be — the specific venues for your market</h2>
      <ul>
        <li><strong>CCI France UAE (French Chamber of Commerce)</strong> — your highest-priority networking venue. Holds regular business events, luncheons, and evenings attended by French business owners, executives, and entrepreneurs. These are exactly your buyer profile. Attend every event. Become known as the young French property consultant who actually knows the market. Over time, request to present a short market update — 10 minutes in front of 50 French business owners is worth months of social media posts in relationship-building quality.</li>
        <li><strong>Developer launch events (Binghatti and DAMAC)</strong> — attended by both agents and buyers. The buyers who attend launches are pre-qualified by their own interest. Your job at a launch is not to sell on the spot — it is to identify who is genuinely interested, have a substantive conversation, and follow up within 24 hours. The notes you take at a launch (this person wants a 2-bed for investment, this person is relocating their family, this person is concerned about developer delivery risk) are raw material for personalised follow-ups that convert.</li>
        <li><strong>UOWD social circles</strong> — your classmates' parents are often HNW professionals and business owners. When someone asks what you do: "I'm a property consultant at Habico — I focus on Binghatti and DAMAC off-plan for international investors, particularly in the French-speaking market." Specific, confident, memorable. If it's relevant, they ask a follow-up question. If not, you haven't wasted time pitching someone who isn't a prospect.</li>
        <li><strong>French schools parent communities</strong> — the Lycée Français International Georges Pompidou in Dubai has a parent community of high-earning French professionals. Many are at exactly the stage of Dubai residency where property purchase makes financial sense. School events and parent communities are natural, low-pressure environments to build these relationships.</li>
        <li><strong>Premium fitness venues</strong> — The Farm, WeFit, and similar venues attract a disproportionately high density of successful professionals. Regular attendance at the same class creates repeated exposure — the social psychology of familiarity means people become progressively more comfortable engaging with you the more they see you. A slow-build channel, but consistently produces high-quality relationships when you're genuine rather than transactional about it.</li>
      </ul>

      <h2>The sales call mechanics — from open to close</h2>
      <p>The phone call is where real estate deals are won or lost more often than anywhere else. WhatsApp builds familiarity and sets up conversations. In-person meetings build deep trust. But the phone call is where qualification happens, pitches are delivered, objections surface and are addressed, and closing decisions are made. You need to be as deliberate about your call structure as a skilled advocate is about an argument — knowing exactly where you're going, adapting to what you encounter on the way, and ending at the outcome you planned to reach.</p>

      <h3>The opening — establish authority without aggression</h3>
      <p>The first 30 seconds of a call determines whether the person stays engaged or starts looking for a polite exit. The worst opening is the immediate pitch. The best opening establishes who you are briefly, confirms it's a good time to talk, and immediately pivots to asking about the client's situation: "Hi [Name], this is Thomas from Habico Real Estate — is this a good moment? I saw you reached out about [project/area] and I wanted to understand a bit more about what you're looking for before I talk to you about specific projects." This tells the client you are person-first, not pitch-first. The difference in how the conversation proceeds is remarkable.</p>

      <h3>Qualification — listen more than you speak in the first five minutes</h3>
      <p>Five questions that reveal everything: "Are you thinking investment, or more for personal use?" "What budget are you working with?" "Are you cash or would you be using a payment plan?" "What's your timeline — next few weeks or still exploring?" "Have you bought property in Dubai before?" These five answers give you: investor vs end-user profile, budget bracket, cash vs plan requirement, urgency level, and experience level. Armed with these, you can pitch the right project in the right way at the right sophistication level. Without them, you're pitching blind.</p>

      <h3>The pitch — one recommendation, three specific reasons</h3>
      <p>After qualification, make one recommendation — not a menu of four projects. Menu presentations create decision paralysis and signal you don't have a strong opinion about what's right for the client. The recommendation format: "Based on what you've described — [their specific parameters] — the project I'd point you toward is Binghatti Wraith in Al Jaddaf. Here's why: [three specific reasons tied to what they told you in qualification]. Does that feel like it fits what you're looking for?" End with a question that invites response, not a statement that invites silence.</p>

      <h3>The close — make it small and reversible</h3>
      <p>The single most effective close in off-plan real estate is the low-commitment ask: "All I need from you to hold this unit is your passport copy and a AED 50,000 transfer — fully refundable for 7 days if you change your mind after reviewing the SPA. You're not committing to the full purchase today. You're just securing the unit while you review the documents." One small, reversible action creates momentum without triggering the fear response that large, irreversible commitments do. Once someone has taken the first step — any step — they are psychologically committed in a way that makes the next step easier to take.</p>

      <h3>Silence — the most underrated closing tool</h3>
      <p>After you make a closing offer, stop talking. Do not fill the silence with additional selling points, reassurances, or retreats. The first person to speak after a proposal is made often ends up conceding something. Let the client think. The silence feels uncomfortable to you — that is precisely why most agents break it and undermine the close they just made. Let it sit. Count to 10 silently if needed. If the client needs to think, they will tell you. If they say yes, you're done. If they have an objection, now you know what it is.</p>

      <h2>Three certainties every buyer needs before they commit</h2>
      <p>A buyer needs to feel certain about three things before they purchase: certainty about the product, certainty about you, and certainty about your company. Most agents only address product certainty. You need to address all three deliberately on every call:</p>
      <ul>
        <li><strong>Product certainty:</strong> Binghatti's track record (7 projects completed in 9 months of 2025, AED 9B cash position), Wraith's specific yield story vs nearby completed units, the escrow protection mechanics. Specifics, not generalities.</li>
        <li><strong>Certainty about you:</strong> Your credentials (French-speaking, Dubai-born, Binghatti and DAMAC specialist), your honesty about what you don't know, your follow-through (you promised to send the floor plans and sent them within the hour). Trust in you is built on specificity, accuracy, and reliability — not charm alone.</li>
        <li><strong>Certainty about your company:</strong> Habico's position in the market, your CEO's relationship with Binghatti and DAMAC, the brokerage's professionalism. If a client asks "why should I go through you vs the developer's direct team?" — "The developer pays my commission, you pay nothing extra. What you get is someone who knows multiple projects across multiple developers, gives independent advice rather than a single developer's pitch, and supports you through the entire process and beyond."</li>
      </ul>

      <h2>Managing your pipeline over time</h2>
      <p>Sales is a performance art, and like all performance arts, it requires energy management as much as skill development. The agents who burn out fastest are those who let every "no" chip away at their energy and attitude, approaching each subsequent call with slightly less conviction until they stop generating results. The agents who sustain performance over years treat rejection as information rather than personal failure. A prospect who says "no" today is a prospect who hasn't yet had the right circumstances to say yes. A follow-up in 60 days, when their situation has changed, may produce a completely different outcome. Track every lead. Follow up every lead. Treat every "no" as "not yet."</p>

      <div class="callout green">
        <div class="callout-title">The only metric that actually matters early</div>
        <p>In your first 6 months, forget about income targets and focus on activity metrics: number of qualified conversations per week (target: 15–20), number of pitches delivered (target: 5–8), number of follow-ups completed per week (target: match your active lead count). Revenue follows activity. The only agents who fail in their first year are those who don't generate enough conversations — not those who have imperfect pitches. Conversations first. Everything else follows.</p>
      </div>
    `

let currentChapter = 0;
let completed = new Set();

function renderSidebar() {
  const list = document.getElementById('chapterList');
  list.innerHTML = CHAPTERS.map((ch, i) => `
    <button class="chapter-btn ${i === currentChapter ? 'active' : ''} ${completed.has(i) ? 'completed' : ''}" onclick="goTo(${i})">
      <span class="ch-num">${completed.has(i) ? '✓' : String(i + 1).padStart(2, '0')}</span>
      <span class="ch-name">${ch.title}</span>
    </button>
  `).join('');
  const pct = Math.round((completed.size / CHAPTERS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${completed.size} of ${CHAPTERS.length} chapters complete`;
}

function renderChapter(i) {
  const ch = CHAPTERS[i];
  const isFirst = i === 0;
  const isLast = i === CHAPTERS.length - 1;
  const isDone = completed.has(i);
  const quizBlock = ch.isFinalExam ? '' : quizHTML(i);
  document.getElementById('chapterContent').innerHTML = `
    <div class="chapter-view">
      <div class="chapter-eyebrow">Chapter ${i + 1} of ${CHAPTERS.length}</div>
      <h1 class="chapter-title">${ch.title}</h1>
      <p class="chapter-subtitle">${ch.subtitle}</p>
      ${ch.content()}
      ${quizBlock}
      <div class="nav-bar">
        ${!isFirst ? `<button class="nav-btn" onclick="goTo(${i - 1})">← Previous</button>` : '<div></div>'}
        <button class="mark-done" onclick="markDone(${i})">${isDone ? '✓ Completed' : 'Mark complete'}</button>
        ${!isLast ? `<button class="nav-btn primary" onclick="goTo(${i + 1})">Next →</button>` : '<div></div>'}
      </div>
    </div>
  `;
  renderCharts(i);
  document.getElementById('main').scrollTo(0, 0);
  // Init quiz for this chapter
  if (ch.isFinalExam) {
    setTimeout(() => { initFinalExam(); initExamProgress(); }, 100);
  } else {
    setTimeout(() => { initQuiz(i); }, 100);
  }
}

function initExamProgress() {
  const questions = FINAL_EXAM;
  const state = window['quizState_finalExam'];
  function update() {
    if (!state) return;
    const answered = state.filter(s => s.answered).length;
    const pct = Math.round(answered / questions.length * 100);
    const fill = document.getElementById('examFill');
    const label = document.getElementById('examLabel');
    if (fill) fill.style.width = pct + '%';
    if (label) label.textContent = answered + ' / ' + questions.length + ' answered';
  }
  // Poll progress
  window._examInterval = setInterval(update, 500);
}

function goTo(i) {
  currentChapter = i;
  renderSidebar();
  renderChapter(i);
}

function markDone(i) {
  if (completed.has(i)) { completed.delete(i); } else { completed.add(i); }
  renderSidebar();
  renderChapter(i);
}

function renderQuiz(questions, containerId) {
  const state = questions.map(function() { return {answered: false, selected: -1}; });
  window['quizState_' + containerId] = state;
  window['quizQ_' + containerId] = questions;

  function buildBlock(qi) {
    var q = questions[qi];
    var s = state[qi];
    var html = '<div class="q-block" id="q-' + containerId + '-' + qi + '">';
    html += '<div class="q-num">Question ' + (qi + 1) + '</div>';
    html += '<div class="q-text">' + q.q + '</div>';
    html += '<div class="q-options">';
    var letters = ['A','B','C','D'];
    for (var oi = 0; oi < q.opts.length; oi++) {
      var cls = '';
      if (s.answered) {
        if (oi === q.a) cls = ' correct';
        else if (oi === s.selected) cls = ' wrong';
      }
      var dis = s.answered ? ' disabled' : '';
      html += '<button class="q-opt' + cls + '"' + dis + ' onclick="answerQ(\'' + containerId + '\',' + qi + ',' + oi + ')">';
      html += '<span class="opt-letter">' + letters[oi] + '</span>';
      html += '<span>' + q.opts[oi] + '</span>';
      html += '</button>';
    }
    html += '</div>';
    if (s.answered) {
      var correct = s.selected === q.a;
      html += '<div class="q-explanation"><strong>' + (correct ? '✓ Correct.' : '✗ Incorrect.') + '</strong> ' + q.exp + '</div>';
    }
    html += '</div>';
    return html;
  }

  function renderAll() {
    var html = '';
    for (var i = 0; i < questions.length; i++) {
      html += buildBlock(i);
    }
    document.getElementById(containerId).innerHTML = html;
  }

  renderAll();
}

window.answerQ = function(containerId, qi, oi) {
  var state = window['quizState_' + containerId];
  var questions = window['quizQ_' + containerId];
  if (!state || state[qi].answered) return;
  state[qi].answered = true;
  state[qi].selected = oi;

  var block = document.getElementById('q-' + containerId + '-' + qi);
  var opts = block.querySelectorAll('.q-opt');
  for (var i = 0; i < opts.length; i++) {
    opts[i].disabled = true;
    if (i === questions[qi].a) opts[i].classList.add('correct');
    else if (i === oi) opts[i].classList.add('wrong');
  }
  var exp = document.createElement('div');
  exp.className = 'q-explanation';
  var correct = oi === questions[qi].a;
  exp.innerHTML = '<strong>' + (correct ? '✓ Correct.' : '✗ Incorrect.') + '</strong> ' + questions[qi].exp;
  block.appendChild(exp);

  // Score display
  var allDone = state.every(function(s, i) { return s.answered; });
  if (allDone) {
    var score = 0;
    for (var j = 0; j < questions.length; j++) {
      if (state[j].selected === questions[j].a) score++;
    }
    var total = questions.length;
    var scoreEl = document.getElementById('score-' + containerId);
    if (scoreEl) {
      scoreEl.style.display = 'flex';
      scoreEl.querySelector('.q-score-val').textContent = score + '/' + total;
      var pct2 = Math.round(score / total * 100);
      var label = pct2 === 100 ? 'Perfect!' : pct2 >= 80 ? 'Strong pass' : 'Keep reviewing';
      scoreEl.querySelector('.q-score-label').textContent = pct2 + '% — ' + label;
    }
    if (containerId === 'finalExam') {
      var pct = Math.round(score / total * 100);
      var grade = pct >= 90 ? 'Distinction' : pct >= 75 ? 'Pass' : pct >= 60 ? 'Borderline — keep studying' : 'Needs more study';
      var colour = pct >= 90 ? 'var(--gold)' : pct >= 75 ? 'var(--green)' : pct >= 60 ? 'var(--accent)' : 'var(--red)';
      var card = document.getElementById('finalScoreCard');
      if (card) {
        card.style.display = 'block';
        card.querySelector('.final-score-pct').textContent = pct + '%';
        card.querySelector('.final-score-pct').style.color = colour;
        card.querySelector('.final-score-sub').textContent = score + ' correct out of ' + total + ' questions';
        card.querySelector('.final-grade').textContent = grade;
        card.querySelector('.final-grade').style.color = colour;
        card.scrollIntoView({ behavior: 'smooth' });
      }
    }
  }

  // Update exam progress bar if in final exam
  if (containerId === 'finalExam') {
    var answered = state.filter(function(s) { return s.answered; }).length;
    var fill = document.getElementById('examFill');
    var lbl = document.getElementById('examLabel');
    if (fill) fill.style.width = Math.round(answered / questions.length * 100) + '%';
    if (lbl) lbl.textContent = answered + ' / ' + questions.length + ' answered';
  }
};

function quizHTML(chapterIndex) {
  var questions = CHAPTER_QUIZZES[chapterIndex];
  if (!questions) return '';
  var cid = 'quiz_ch_' + chapterIndex;
  return '<div class="quiz-section">'
    + '<div class="quiz-header">'
    + '<div class="quiz-title">Chapter review — 5 questions</div>'
    + '<div class="quiz-subtitle">Test what you just read. Explanations show for every answer.</div>'
    + '</div>'
    + '<div class="q-score-bar" id="score-' + cid + '" style="display:none">'
    + '<div><div class="q-score-val"></div><div class="q-score-label"></div></div>'
    + '</div>'
    + '<div id="' + cid + '"></div>'
    + '</div>';
}

function initQuiz(chapterIndex) {
  var questions = CHAPTER_QUIZZES[chapterIndex];
  if (!questions) return;
  var cid = 'quiz_ch_' + chapterIndex;
  renderQuiz(questions, cid);
}

function initFinalExam() {
  renderQuiz(FINAL_EXAM, 'finalExam');
}


// Init
renderSidebar();
renderChapter(0);
</script>
